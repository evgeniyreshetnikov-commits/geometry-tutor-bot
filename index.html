<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Геометрия 7 класс — Telegram-бот</title>
  <style>
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg,#f8fbff,#eef6ff); color:#24324a; margin:0; padding:24px; }
    .card { max-width: 860px; margin: 0 auto; background:#fff; border-radius:24px; padding:32px; box-shadow:0 10px 30px rgba(0,0,0,.08); }
    h1 { margin-top:0; }
    .btn { display:inline-block; padding:14px 22px; border-radius:14px; background:#229ED9; color:#fff; text-decoration:none; font-weight:bold; }
    .note { margin-top:16px; padding:14px; background:#fff8d8; border-radius:12px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Геометрия 7 класс</h1>
    <p>Telegram-бот помогает понять задачу, найти идею доказательства и решить её по шагам без готовых ответов.</p>
    <p>Поддерживает текст, PDF, DOCX, JPG и PNG.</p>
    <a class="btn" href="https://t.me/your_bot_username" target="_blank" rel="noopener">Открыть Telegram-бота</a>
    <div class="note">
      Замените ссылку на свою ссылку бота. Для публикации можно использовать GitHub Pages.
    </div>
  </div>
</body>
</html>
